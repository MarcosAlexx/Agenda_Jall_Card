<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>

<div class="container">
    <div class="form-container">
        <h1>Login</h1>

        <div class="alert alert-error" th:if="${param.error}">
            Email/Username ou senha incorretos.
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            Logout realizado com sucesso.
        </div>

        <div class="alert alert-success" th:if="${param.cadastro}">
            Cadastro realizado com sucesso! Faça login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Email ou Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <p class="form-link">
            Não tem uma conta? <a th:href="@{/cadastro}">Cadastre-se</a>
        </p>
    </div>
</div>

</body>
</html>
