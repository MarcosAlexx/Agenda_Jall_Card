<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contato')}"></head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="container">
    <div class="form-container form-wide">
        <h1 th:text="${contato.id != null ? 'Editar Contato' : 'Novo Contato'}"></h1>

        <div th:replace="~{fragments/layout :: mensagens}"></div>

        <form th:action="${contato.id != null ? '/contatos/' + contato.id + '/editar' : '/contatos/novo'}"
              th:object="${contato}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" th:field="*{nome}" required>
                    <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>

                <div class="form-group">
                    <label for="sobrenome">Sobrenome *</label>
                    <input type="text" id="sobrenome" th:field="*{sobrenome}" required>
                    <span class="error" th:if="${#fields.hasErrors('sobrenome')}" th:errors="*{sobrenome}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dataNascimento">Data de Nascimento *</label>
                    <input type="date" id="dataNascimento" th:field="*{dataNascimento}" required>
                    <span class="error" th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}"></span>
                </div>

                <div class="form-group">
                    <label for="grauParentesco">Grau de Parentesco</label>
                    <input type="text" id="grauParentesco" th:field="*{grauParentesco}" placeholder="Ex: Pai, Mae, Amigo...">
                </div>
            </div>

            <div class="telefones-section">
                <h3>Telefones *</h3>
                <span class="error" th:if="${#fields.hasErrors('telefones')}" th:errors="*{telefones}"></span>

                <div id="telefones-container">
                    <div class="telefone-row" th:each="telefone, stat : *{telefones}">
                        <div class="form-group">
                            <label>Numero *</label>
                            <input type="text" th:field="*{telefones[__${stat.index}__].numero}"
                                   class="telefone-input" placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select th:field="*{telefones[__${stat.index}__].tipo}">
                                <option value="">Selecione...</option>
                                <option th:each="tipo : ${T(br.com.jallcard.agenda.enums.TipoTelefone).values()}"
                                        th:value="${tipo}"
                                        th:text="${tipo.descricao}">
                                </option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-danger btn-small" onclick="removerTelefone(this)">Remover</button>
                    </div>
                </div>

                <button type="button" class="btn btn-secondary" onclick="adicionarTelefone()">+ Adicionar Telefone</button>
            </div>

            <div class="form-actions">
                <a th:href="@{/contatos}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    let telefoneIndex = document.querySelectorAll('.telefone-row').length;

    function adicionarTelefone() {
        const container = document.getElementById('telefones-container');
        const div = document.createElement('div');
        div.className = 'telefone-row';
        div.innerHTML = `
            <div class="form-group">
                <label>Numero *</label>
                <input type="text" name="telefones[${telefoneIndex}].numero"
                       class="telefone-input" placeholder="(00) 00000-0000" required>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select name="telefones[${telefoneIndex}].tipo">
                    <option value="">Selecione...</option>
                    <option value="CELULAR">Celular</option>
                    <option value="RESIDENCIAL">Residencial</option>
                    <option value="COMERCIAL">Comercial</option>
                </select>
            </div>
            <button type="button" class="btn btn-danger btn-small" onclick="removerTelefone(this)">Remover</button>
        `;
        container.appendChild(div);
        telefoneIndex++;
    }

    function removerTelefone(btn) {
        const rows = document.querySelectorAll('.telefone-row');
        if (rows.length > 1) {
            btn.parentElement.remove();
        } else {
            alert('O contato deve ter pelo menos um telefone.');
        }
    }

    // Garante pelo menos um telefone ao carregar
    if (document.querySelectorAll('.telefone-row').length === 0) {
        adicionarTelefone();
    }

    // Máscara de telefone
    function mascaraTelefone(input) {
        let valor = input.value.replace(/\D/g, '');
        if (valor.length > 11) valor = valor.slice(0, 11);

        if (valor.length > 6) {
            valor = valor.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
        } else if (valor.length > 2) {
            valor = valor.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
        } else if (valor.length > 0) {
            valor = valor.replace(/^(\d{0,2})/, '($1');
        }

        input.value = valor;
    }

    // Aplica máscara nos inputs existentes e futuros
    document.addEventListener('input', function(e) {
        if (e.target.classList.contains('telefone-input')) {
            mascaraTelefone(e.target);
        }
    });
</script>

</body>
</html>
