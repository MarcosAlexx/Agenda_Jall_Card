<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cadastro')}"></head>
<body>

<div class="container">
    <div class="form-container">
        <h1>Cadastro</h1>

        <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

        <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" required>
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" required>
                <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" th:field="*{password}" required>
                <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>

        <p class="form-link">
            Ja tem uma conta? <a th:href="@{/login}">Fazer Login</a>
        </p>
    </div>
</div>

</body>
</html>
