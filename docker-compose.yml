version: '3.8'

services:
  app:
    build: .
    container_name: agenda-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/agendadb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
    volumes:
      - agenda-data:/app/data

volumes:
  agenda-data:
